<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c3d47">
  <title>QResto — Panel camarero</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/camarero.css">
</head>
<body class="camarero-body">
  <div id="login-pantalla-camarero" class="login-pantalla">
    <div class="login-card">
      <span class="hero__marca">QResto</span>
      <h1>Panel camarero</h1>
      <p class="login-card__sub">Acceso de sala</p>
      <form id="login-form-camarero">
        <label for="usuario-camarero">Usuario</label>
        <input type="text" id="usuario-camarero" placeholder="Ej: ana" required autocomplete="username">
        <label for="password-camarero">Contraseña</label>
        <input type="password" id="password-camarero" placeholder="Contraseña de camarero" required autocomplete="current-password">
        <button type="submit" class="btn-panel btn-panel--primario" id="btn-login-camarero">Entrar</button>
      </form>
      <p id="login-error-camarero" class="login-error" hidden></p>
    </div>
  </div>

  <div id="app-camarero" hidden>
    <header class="camarero-header">
      <div>
        <span class="hero__marca">QResto</span>
        <h1>Panel de sala</h1>
        <p class="camarero-header__sub" id="local-nombre">Cargando...</p>
      </div>
      <div class="camarero-header__acciones">
        <a href="/?mesa=1" class="camarero-header__link" target="_blank">Ver carta ↗</a>
        <button type="button" class="camarero-header__link camarero-header__link--btn" id="btn-logout-camarero">Salir</button>
      </div>
    </header>

    <section class="alertas" id="alertas" hidden>
      <h2>🔔 Llamadas pendientes</h2>
      <div id="alertas-lista"></div>
    </section>

    <section class="mesas-seccion">
      <h2>Mesas</h2>
      <div class="leyenda">
        <span><i class="dot libre"></i> Libre</span>
        <span><i class="dot ocupada"></i> Ocupada</span>
        <span><i class="dot atencion"></i> Llama</span>
      </div>
      <div class="mesas-grid" id="mesas-grid"></div>
    </section>

    <!-- Detalle mesa -->
    <div class="modal" id="modal-mesa" hidden>
      <div class="modal__backdrop" data-cerrar-mesa></div>
      <div class="modal__panel">
        <div class="modal__header">
          <h2 id="mesa-detalle-titulo">Mesa 1</h2>
          <button type="button" class="modal__cerrar" data-cerrar-mesa>&times;</button>
        </div>
        <div class="modal__body" id="mesa-detalle-body"></div>
        <div class="modal__footer mesa-acciones" id="mesa-acciones"></div>
      </div>
    </div>

    <div class="toast" id="toast-camarero" hidden></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/camarero.js"></script>
</body>
</html>
