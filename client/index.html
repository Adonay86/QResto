<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c3d47">
  <meta name="description" content="QResto — Carta digital del restaurante">
  <title>QResto — Carta</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Hero header -->
    <header class="hero">
      <div class="hero__imagen" aria-hidden="true"></div>
      <div class="hero__overlay"></div>
      <div class="hero__contenido">
        <div class="hero__top">
          <span class="hero__marca">QResto</span>
          <span class="hero__mesa-badge" id="mesa-info">Mesa —</span>
        </div>
        <h1 class="hero__nombre" id="local-nombre">Cargando...</h1>
        <p class="hero__subtitulo" id="local-subtitulo"></p>
      </div>
    </header>

    <!-- Categorías -->
    <nav class="categorias" id="categorias" aria-label="Categorías de la carta"></nav>

    <!-- Lista productos -->
    <main class="productos" id="productos">
      <div class="cargando" id="cargando">
        <div class="cargando__spinner"></div>
        <p>Cargando carta...</p>
      </div>
    </main>

    <!-- Barra inferior -->
    <footer class="barra-inferior">
      <button type="button" class="btn btn--llamar" id="btn-llamar" aria-label="Llamar al camarero">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 8a3 3 0 0 0-3-3 3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V8z"/>
          <path d="M6 10v4a6 6 0 0 0 12 0v-4"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
        <span>Camarero</span>
      </button>
      <button type="button" class="btn btn--carrito" id="btn-carrito">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span>Mi pedido</span>
        <span class="badge" id="carrito-count" hidden>0</span>
      </button>
    </footer>

    <!-- Modal carrito -->
    <div class="modal" id="modal-carrito" hidden>
      <div class="modal__backdrop" data-cerrar></div>
      <div class="modal__panel">
        <div class="modal__header">
          <h2>Tu pedido</h2>
          <button type="button" class="modal__cerrar" data-cerrar aria-label="Cerrar">&times;</button>
        </div>
        <div class="modal__body" id="carrito-lista"></div>
        <div class="modal__footer">
          <div class="total">
            <span>Total</span>
            <strong id="carrito-total">0,00 €</strong>
          </div>
          <button type="button" class="btn btn--confirmar btn--ancho" id="btn-confirmar" disabled>
            Confirmar pedido
          </button>
        </div>
      </div>
    </div>

    <!-- Modal pedido confirmado -->
    <div class="modal" id="modal-pedido" hidden>
      <div class="modal__backdrop" data-cerrar-pedido></div>
      <div class="modal__panel modal__panel--centro">
        <div class="modal__icono-ok">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2>¡Pedido enviado!</h2>
        <p class="modal__texto" id="pedido-resumen">Tu pedido ha llegado a cocina.</p>
        <button type="button" class="btn btn--confirmar btn--ancho" data-cerrar-pedido>Entendido</button>
      </div>
    </div>

    <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
